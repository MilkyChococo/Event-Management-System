name: ci

on:
  push:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run backend unit and integration tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

  playwright-smoke:
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start app
        env:
          APP_USE_MOCK_DB: "true"
          APP_MONGO_URI: mongodb://unused
          APP_MONGO_DB_NAME: ci_smoke
        run: python -m uvicorn app.main:app --host 127.0.0.1 --port 10104 &

      - name: Wait for app
        run: |
          for attempt in {1..20}; do
            curl --fail http://127.0.0.1:10104/health && exit 0
            sleep 2
          done
          exit 1

      - name: Run Playwright smoke tests
        run: npm run test:e2e:smoke

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
